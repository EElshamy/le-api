  <body style="margin: 0; font-family: 'Somar Sans', sans-serif">
    <main
      style="
        width: 1400px;
        height: 1000px;
        border: 1px solid black;
        overflow: hidden;
        display: flex;
        position: relative;
      "
    >
      <!-- Side Image -->
      <section
        style="
          position: absolute;
          top: 0;
          left: 0;
          width: 100%;
          height: 100%;
          overflow: hidden;
          z-index: -1;
        "
      >
        <img
          style="
            width: 100%;
            height: 100%;
            object-fit: cover;
            position: absolute;
            z-index: -1;
          "
          src="{background}"
          alt="certificate-side-img"
        />
      </section>

      <!-- Main Content -->
      <section style="width: 100%; height: 100%; padding: 40px">
        <div
          style="
            width: calc(100% - 80px);
            height: calc(100% - 200px);
            display: flex;
            justify-content: center;
            position: relative;
            overflow: hidden;
            padding: 60px 40px;
            border-radius: 24px;
            background-color: #f8f5f3;
          "
        >
          <div
            style="
              display: flex;
              flex-direction: column;
              align-items: center;
              position: relative;
              width: 100%;
            "
          >
            <!-- Logo -->
            <div
              style="
                max-width: 250px;
                display: flex;
                align-items: center;
                margin-bottom: 20px;
              "
            >
              <img style="width: 100%" src="{leiaqaLogo}" alt="leiaqa logo" />
            </div>

            <!-- Title -->
            <div
              style="
                display: flex;
                justify-content: center;
                align-items: center;
                flex-direction: column;
              "
            >
              <h1
                style="
                  color: #76003e;
                  text-align: center;
                  font-size: 80px;
                  margin: 50px 0 5px 0;
                  font-weight: 400;
                  text-transform: uppercase;
                "
              >
                شــهــادة إتــمــام
              </h1>
              <h2
                style="
                  color: #76003e;
                  font-size: 38px;
                  margin: 0 0;
                  font-weight: 400;
                "
              >
                تشهد منصة لياقة بأن
              </h2>

              <!-- Student Name -->
              <h3
                style="
                  font-size: 28px;
                  letter-spacing: 1px;
                  margin: 10px 0 20px;
                  text-align: center;
                  color: #ff5552;
                "
              >
                {fullName}
              </h3>

              <!-- Description -->
              <p
                style="
                  text-align: center;
                  letter-spacing: 1px;
                  max-width: 800px;
                  font-size: 28px;
                  color: #000000;
                  line-height: 1.8;
                  font-weight: 100;
                  margin: 0 0 10px;
                "
              >
                قد أكمل بنجاح {learningProgramType} وقد حصل على المهارات
                والمعرفة اللازمة في هذا المجال
              </p>

              <!-- Track Title -->
              <p
                style="
                  font-size: 24px;
                  color: #ff5552;
                  margin: 10px 0 10px;
                  text-align: center;
                "
              >
                {courseTitle}
              </p>

              <!-- Date -->
              <p
                style="
                  font-size: 24px;
                  color: #000000;
                  font-weight: 300;
                  text-align: center;
                  margin: 10px 0 0 0;
                "
              >
                <span style="margin-left: 5px">التــاريــخ: </span>
                <span>{certificateDate}</span>
              </p>
            </div>
          </div>

          <!-- Footer -->
          <div
            style="
              display: flex;
              justify-content: space-between;
              width: calc(100% - 80px);
              margin: auto;
              position: absolute;
              left: 0;
              right: 0;
              bottom: 60px;
            "
          >
            <!-- Signature -->
            <div style="text-align: right">
              <p
                style="
                  font-size: 24px;
                  color: #000;
                  line-height: 1.4;
                  margin: 0 0 6px 0;
                  font-weight: 500;
                "
              >
                المدير العلمي
              </p>
              <img
                src="{signature}"
                alt="Signature"
                style="
                  height: 32px;
                  width: 233px;
                  display: block;
                  max-width: 200px;
                "
              />
            </div>

            <!-- Certificate Number -->
            <div style="color: #000">
              <p
                style="
                  font-size: 24px;
                  font-weight: 500;
                  margin: 0 0 6px 0;
                  text-align: center;
                "
              >
                رقم المستخدم
              </p>
              <p
                style="
                  font-size: 16px;
                  font-weight: 300;
                  margin: 0;
                  text-align: center;
                "
              >
              {userCode}
              </p>
            </div>
            <div style="color: #000">
              <p
                style="
                  font-size: 24px;
                  font-weight: 500;
                  margin: 0 0 6px 0;
                  text-align: left;
                "
              >
                رقم الشهادة
              </p>
              <p style="font-size: 16px; font-weight: 300; margin: 0">
                {certificateNumber}
              </p>
            </div>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
